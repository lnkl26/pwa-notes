<body>
    <div class="signup-login-forms" id="signup-login-forms">
        <form id="signup">
            <h1>New Ponderer?</h1>
            <p>Create an account!</p>
            <div class="email-input">
                <label for="newemail">Your Email: </label>
                <input type="email" id="newemail" placeholder="ex. you@example.com" required>
            </div>
            <div class="password-input">
                <label for="newpassword">Your Password: </label>
                <input type="password" id="newpassword" placeholder="Password">
            </div>
            <input class="submit-btn" type="submit" value="Sign Up">
        </form>
        <form id="login">
            <h1>Existing Ponderer?</h1>
            <p>Log in to see your notes!</p>
            <div class="email-input">
                <label for="existemail">Your Email: </label>
                <input type="email" id="existemail" placeholder="ex. you@example.com" required>
            </div>
            <div class="password-input">
                <label for="existpassword">Your Password: </label>
                <input type="password" id="existpassword" placeholder="Password">
            </div>
            <input class="submit-btn" type="submit" value="Log In">
        </form>
    </div>
    <div class="friend-list" id="account-info">
        <div class="profile-container">
            <div class="user-pfp">
                <img src="../styles/assets/images/userpfps/frog.png">
            </div>
            <div class="user-display-name">
                <input type="text" placeholder="Ponderer" id="userDisplayName">
                <button id="updateDisplayNameBtn">Update Display Name</button>
            </div>
        </div>
        <div class="toggles">
            <img src="../styles/assets/images/icons/day-and-night.png">
            <img src="../styles/assets/images/icons/log-out.png">
        </div>
        <div class="friends">
            <h2>Your Friends</h2>
        </div>
        <div class="pending">
            <h2>Pending Friendships</h2>
        </div>
    </div>
    <div class="nav-bar">
        <a href="newnote.html"><button>new note</button></a>
        <a href="../index.html"><button id="main-menu-btn"><img class="icon" src="../styles/assets/images/icons/home-agreement.png"></button></a>
        <a href="viewnote.html"><button>view notes</button></a>
    </div>
